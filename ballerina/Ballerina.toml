[package]
distribution = "2201.12.0"
org = "ballerinax"
name = "ai.azure.storage.blob"
version = "1.0.0"
license = ["Apache-2.0"]
icon = "icon.png"
authors = ["Ballerina"]
keywords = ["Vendor/Microsoft", "Area/AI & Machine Learning", "Type/Data Loader", "azure", "blob", "storage"]
repository = "https://github.com/ballerina-platform/module-ballerinax-ai.loader.azureblob"

[platform.java21]
graalvmCompatible = true

# Native text extractor (Apache Tika) for this package.
[[platform.java21.dependency]]
groupId = "io.ballerina.lib"
artifactId = "ai.azure.storage.blob-native"
version = "1.0.0"
path = "../native/build/libs/ai.azure.storage.blob-native-1.0.0.jar"

# Apache Tika core + PDF parser module (PDFBox) + Microsoft Office parser module (POI).
# `classify` routes each blob to the matching module (see `TextExtractor` / `classify`).
[[platform.java21.dependency]]
groupId = "org.apache.tika"
artifactId = "tika-core"
version = "3.2.2"

[[platform.java21.dependency]]
groupId = "org.apache.tika"
artifactId = "tika-parser-pdf-module"
version = "3.2.2"

[[platform.java21.dependency]]
groupId = "org.apache.tika"
artifactId = "tika-parser-microsoft-module"
version = "3.2.2"

# Tika ZIP/container detection — required so OOXML (.docx/.pptx/.xlsx) files are detected.
[[platform.java21.dependency]]
groupId = "org.apache.tika"
artifactId = "tika-parser-zip-commons"
version = "3.2.2"

# Apache PDFBox (PDF parsing, used by the Tika PDF module).
[[platform.java21.dependency]]
groupId = "org.apache.pdfbox"
artifactId = "pdfbox"
version = "3.0.5"

[[platform.java21.dependency]]
groupId = "org.apache.pdfbox"
artifactId = "pdfbox-io"
version = "3.0.5"

[[platform.java21.dependency]]
groupId = "org.apache.pdfbox"
artifactId = "fontbox"
version = "3.0.5"

[[platform.java21.dependency]]
groupId = "org.apache.pdfbox"
artifactId = "jempbox"
version = "1.8.17"

# Commons IO, required by Tika/PDFBox.
[[platform.java21.dependency]]
groupId = "commons-io"
artifactId = "commons-io"
version = "2.20.0"

# Apache POI (Microsoft Office parsing, used by the Tika microsoft module) and its
# runtime dependencies. Versions match those bundled by the ballerina/ai module.
[[platform.java21.dependency]]
groupId = "org.apache.poi"
artifactId = "poi"
version = "5.4.1"

[[platform.java21.dependency]]
groupId = "org.apache.poi"
artifactId = "poi-ooxml"
version = "5.4.1"

[[platform.java21.dependency]]
groupId = "org.apache.poi"
artifactId = "poi-ooxml-lite"
version = "5.4.1"

[[platform.java21.dependency]]
groupId = "org.apache.poi"
artifactId = "poi-scratchpad"
version = "5.4.1"

[[platform.java21.dependency]]
groupId = "org.apache.xmlbeans"
artifactId = "xmlbeans"
version = "5.3.0"

[[platform.java21.dependency]]
groupId = "org.apache.commons"
artifactId = "commons-collections4"
version = "4.4"

[[platform.java21.dependency]]
groupId = "org.apache.commons"
artifactId = "commons-compress"
version = "1.28.0"

[[platform.java21.dependency]]
groupId = "com.zaxxer"
artifactId = "SparseBitSet"
version = "1.3"

[[platform.java21.dependency]]
groupId = "org.apache.logging.log4j"
artifactId = "log4j-api"
version = "2.25.4"

[[platform.java21.dependency]]
groupId = "org.apache.logging.log4j"
artifactId = "log4j-core"
version = "2.25.4"
