[fixture]
marker = FORMAT_MARKER_CONF
key.0 = The Azure Blob Storage data loader retrieves documents from one or more containers and returns them as text.
key.1 = Plain-text formats are decoded directly from their bytes, while PDF documents are parsed with Apache Tika.
key.2 = Virtual folders are expressed as slashes in the blob name, and recursion can be enabled per configured source.
key.3 = An optional extension allowlist restricts which blobs in a folder listing are turned into documents.
key.4 = Unsupported binaries such as images and Microsoft Office documents are skipped during folder loads.
key.5 = When a blob is named explicitly, a deliberately unsupported type is reported as an error instead of skipped.
key.6 = Listing follows the NextMarker pagination cursor so that large containers are fully enumerated.
key.7 = Each returned document carries metadata: the file name, MIME type, size, and any available timestamps.
key.8 = This fixture exists to exercise the loader end to end against a real storage account.
key.9 = It contains several paragraphs so that extraction has meaningful content to return and assert on.
key.10 = Text extraction should preserve the readable words on every page of a multi-page document.
key.11 = The loader treats a path with a trailing slash as a folder prefix rather than an exact blob name.
